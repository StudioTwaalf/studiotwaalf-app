<!--
  BASE TEMPLATE — Studio Twaalf
  Table-based HTML email fallback.
  Use this as the structural reference for all HTML email templates.

  Placeholders:
    {{PREVIEW}}     — preview text shown in inbox
    {{CONTENT}}     — main email body (paragraphs, CTAs, etc.)
    {{FOOTER_EXTRA}}— optional extra footer lines (unsubscribe, etc.)
-->
<!DOCTYPE html>
<html lang="nl" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="x-apple-disable-message-reformatting" />
  <title>Studio Twaalf</title>
  <!--[if mso]>
  <noscript>
    <xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml>
  </noscript>
  <![endif]-->
  <style>
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    body { margin: 0 !important; padding: 0 !important; width: 100% !important; }
    a[x-apple-data-detectors] { color: inherit !important; text-decoration: none !important; font-size: inherit !important; font-family: inherit !important; font-weight: inherit !important; line-height: inherit !important; }
    @media screen and (max-width: 600px) {
      .container { width: 100% !important; padding: 24px 16px !important; }
      .card { padding: 24px 20px !important; border-radius: 8px !important; }
      .summary-card { padding: 16px 20px !important; }
      .btn { display: block !important; text-align: center !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#FAF7F2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">

  <!-- Preview text (hidden) -->
  <div style="display:none;max-height:0;overflow:hidden;mso-hide:all;">{{PREVIEW}}&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;</div>

  <!-- Outer wrapper -->
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color:#FAF7F2;">
    <tr>
      <td align="center" valign="top" style="padding:40px 20px;">

        <!-- Container -->
        <table class="container" role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" style="max-width:600px;width:100%;">

          <!-- HEADER -->
          <tr>
            <td align="center" valign="middle" style="padding:32px 0;border-bottom:1px solid #E5DDD4;">
              <p style="margin:0;font-size:18px;font-weight:600;letter-spacing:0.08em;color:#8B6F3E;text-transform:uppercase;">Studio Twaalf</p>
            </td>
          </tr>

          <!-- BODY -->
          <tr>
            <td style="padding:8px 0;">
              {{CONTENT}}
            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td style="padding-top:32px;">
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr><td style="border-top:1px solid #E5DDD4;padding-top:24px;text-align:center;">
                  <p style="margin:0 0 4px;font-size:13px;color:#7A6655;">Studio Twaalf</p>
                  <p style="margin:0;font-size:13px;color:#A89585;">Vragen? Antwoord gewoon op deze mail — we helpen je graag.</p>
                  {{FOOTER_EXTRA}}
                </td></tr>
              </table>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
